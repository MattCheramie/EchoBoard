name: Backend CI

on:
  push:
    branches: [main]
    paths: ['backend/**', '.github/workflows/backend-ci.yml']
  pull_request:
    paths: ['backend/**', '.github/workflows/backend-ci.yml']

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: go vet
        run: go vet ./...

      # gofmt is the canonical formatter (no goimports). Fail the build with a
      # list of unformatted files rather than silently reformatting.
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::unformatted Go files (run 'gofmt -w .' locally):"
            echo "$unformatted"
            exit 1
          fi

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race -count=1 ./...

  # govulncheck enumerates known CVEs affecting the direct + transitive
  # dependency graph. A known-vulnerable dep blocks merge: upgrade it, accept
  # the risk with a documented justification, or substitute a clean dep.
  govulncheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Scan
        run: govulncheck ./...
