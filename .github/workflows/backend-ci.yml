name: Backend CI

# No path filter — deliberately. The `Protect main` ruleset makes the `backend`
# job a required status check, and repository rulesets (unlike the legacy
# branch-protection system) do NOT auto-pass a required check when its workflow
# is skipped via a path filter: a skipped run never reports, leaving the PR in
# mergeable_state=blocked even for a frontend-only or docs-only change. Running
# the backend job on every PR is the simplest way to keep that contract honest;
# it is cheap for a Go module of this size.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: go vet
        run: go vet ./...

      # gofmt is the canonical formatter (no goimports). Fail the build with a
      # list of unformatted files rather than silently reformatting.
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::unformatted Go files (run 'gofmt -w .' locally):"
            echo "$unformatted"
            exit 1
          fi

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race -count=1 ./...

  # govulncheck enumerates known CVEs affecting the direct + transitive
  # dependency graph. A known-vulnerable dep blocks merge: upgrade it, accept
  # the risk with a documented justification, or substitute a clean dep.
  govulncheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Scan
        run: govulncheck ./...
